name: Redeploy crewhaus.ai

# crewhaus.ai vendors this repo's markdown into /docs/reference/* at BUILD
# time (crewhaus/website scripts/sync-docs-content.mjs), so a merge here does
# not reach the live site until the website rebuilds. This fires the
# website's redeploy-content.yml via repository_dispatch on every push to
# main. Requires the WEBSITE_DISPATCH_TOKEN secret — a fine-grained PAT on
# crewhaus/website with "Contents: read and write".
# See the crewhaus/website README, "Vendored content" section.

on:
  push:
    branches: [main]

permissions: {}

jobs:
  dispatch:
    runs-on: ubuntu-latest
    steps:
      - name: Fire docs-content-updated dispatch to crewhaus/website
        run: |
          curl -sS --fail -X POST \
            -H "Authorization: Bearer $TOKEN" \
            -H "Accept: application/vnd.github+json" \
            https://api.github.com/repos/crewhaus/website/dispatches \
            -d '{"event_type":"docs-content-updated"}'
        env:
          TOKEN: ${{ secrets.WEBSITE_DISPATCH_TOKEN }}
